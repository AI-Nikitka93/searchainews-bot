name = "searchainews-bot"
main = "src/index.ts"
compatibility_date = "2026-03-14"

[vars]
APP_NAME = "SearchAInews"
DEFAULT_ROLE = "developer"
ALLOW_WEBHOOK_WITHOUT_SECRET = "true"
OPENROUTER_MODEL = "openrouter/free"
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
STALE_NEWS_HOURS = "12"
CHANNEL_CHAT_ID = "-1003769500255"
CHANNEL_POST_GAP_SECONDS = "3600"
CHANNEL_LANGUAGE = "ru"
CHANNEL_USE_AI_SUMMARY = "true"
CHANNEL_MIN_IMPACT = "3"
CHANNEL_EXCLUDE_DOMAINS = ""
CHANNEL_DEDUPE_HOURS = "72"
CHANNEL_POST_MIN_ITEMS = "3"
CHANNEL_POST_MAX_ITEMS = "3"
CHANNEL_MODEL_RELEASE_ONE_BY_ONE = "true"
CHANNEL_MAX_AGE_HOURS = "36"
CHANNEL_MIN_SUMMARY_CHARS = "40"
CHANNEL_RESEARCH_DOMAINS = "arxiv.org,papers.takara.ai"
CHANNEL_MAX_RESEARCH_PER_POST = "2"
CHANNEL_BREAKING_MIN_IMPACT = "5"
CHANNEL_BREAKING_KEYWORDS = "new model,model release,launches model,released model,introducing,gpt-5,gpt-4.5,claude,gemini,llama,qwen,mistral,deepseek,pixtral,magistral,devstral,reasoning model,foundation model,open model,api release,flagship model,opensources model,weights released,выпустила модель,новая модель,релиз модели,представила модель"
CHANNEL_MODEL_RELEASE_MIN_IMPACT = "3"
CHANNEL_ACTIVE_HOURS = "09-23"
CHANNEL_TZ_OFFSET_MINUTES = "180"
CHANNEL_DAILY_REPORT_HOUR = "21"
NEWS_MAX_AGE_HOURS = "36"
NEWS_RESEARCH_DOMAINS = "arxiv.org,papers.takara.ai"
NEWS_MAX_RESEARCH_PER_BATCH = "1"

[[d1_databases]]
binding = "DB"
database_name = "searchainews"
database_id = "ecf59b93-fdf3-4a5d-93e8-c09f7e55c251"

[ai]
binding = "AI"

[triggers]
crons = ["0 * * * *"]
