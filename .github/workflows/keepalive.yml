name: keepalive

on:
  schedule:
    - cron: '0 0 1 * *' # Запуск 1-го числа каждого месяца
  workflow_dispatch: # Возможность ручного запуска из интерфейса GitHub

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update keepalive file
        run: |
          mkdir -p .github
          echo "Last keepalive run: $(date)" > .github/keepalive.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: keep repository active [skip ci]" && git push)
