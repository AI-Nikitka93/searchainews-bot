app_name: "SearchAInews"
db_path: "${LOCALAPPDATA}/SearchAInews/data/news.db"

http:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/132.0.0.0 Safari/537.36"
  timeout_seconds: 25
  jina_timeout_seconds: 35
  retries_total: 5
  backoff_factor: 1.6
  status_forcelist: [429, 500, 502, 503, 504]
  jitter_seconds: [1.5, 4.5]
  source_pause_seconds: [2.0, 6.0]

freshness_max_days: 7
source_cooldown_minutes: 45
source_max_failures: 3
hard_fail_status_codes: [401, 403, 451]
hard_fail_cooldown_hours: 24

jina_reader:
  enabled: true
  endpoint_prefix: "https://r.jina.ai/"
  exclude_domains:
    - "news.ycombinator.com"
    - "openai.com"

sources:
  - id: "openai_chatgpt_release_notes"
    name: "OpenAI ChatGPT Release Notes"
    type: "release_notes"
    url: "https://help.openai.com/en/articles/6825453-chatgpt-release-notes"
    max_items: 12
    tier: 1
    heading_tags: ["h2", "h3"]
    jina_only: false
    force_jina: false
    enable_jina: false
    freshness_max_days: 60

  - id: "openai_model_release_notes"
    name: "OpenAI Model Release Notes"
    type: "release_notes"
    url: "https://help.openai.com/en/articles/9624314-model-release-notes"
    max_items: 12
    tier: 1
    heading_tags: ["h2", "h3"]
    jina_only: false
    force_jina: false
    enable_jina: false
    freshness_max_days: 60

  - id: "anthropic_release_notes"
    name: "Anthropic API Release Notes"
    type: "release_notes"
    url: "https://platform.claude.com/docs/en/release-notes/overview"
    max_items: 12
    tier: 1
    heading_tags: ["h2", "h3"]
    enable_jina: false
    freshness_max_days: 60

  - id: "openai_news"
    name: "OpenAI News RSS"
    type: "rss"
    url: "https://openai.com/news/rss.xml"
    max_items: 10
    tier: 1
    enable_jina: true

  - id: "google_blog_ai"
    name: "Google Blog (AI via keyword filter)"
    type: "rss"
    url: "https://blog.google/rss/"
    max_items: 12
    tier: 2
    enable_jina: false
    keywords_include:
      - "ai"
      - "artificial intelligence"
